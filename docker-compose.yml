services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: qr_platform

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: qr_platform
      SECRET_KEY: change-me-in-production-please!!
      BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  telegram_bot:
    build: ./telegram_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-6536016874:AAHP3iZIqHgD7ls-nzscCe90isXsxgIKpe4}
      API_BASE_URL: http://backend:8000
    volumes:
      - bot_data:/app/bot_data
    depends_on:
      - backend

volumes:
  mongo_data:
  bot_data:
